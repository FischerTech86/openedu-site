<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TELA DE LOGIN (Visível por padrão) -->
    <div id="container-login">
        <h1>GABARITEI - Login</h1>
        <input type="text" id="usuario" placeholder="Digite seu usuário">
        <input type="password" id="senha" placeholder="Digite sua senha">
        <!-- O botão chama a função 'logar' -->
        <button onclick="logar()">Acessar o Gabaritei</button>
    </div>

    <!-- PAINEL PRINCIPAL (Escondido por padrão) -->
    <div id="painel-principal" style="display: none;">
        <h1>Bem-vindo ao Painel!</h1>
        <button onclick="sair()">Sair da Conta</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
