<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore - Login</title>
    <style>
        /* Fundo da página */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container do formulário (Cinza bem forte) */
        .login-box {
            background-color: #202020;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 320px;
            text-align: center;
            color: white;
        }

        /* Nome do site */
        .brand {
            font-size: 26px;
            font-weight: bold;
            color: #007bff;
            margin-bottom: 10px;
        }

        h2 { 
            margin-bottom: 25px; 
            font-weight: 600;
            color: #ffffff;
        }

        /* Campos de texto */
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #333333;
            color: white;
            font-size: 14px;
        }

        /* Botão de Acesso */
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Links inferiores */
        .links {
            margin-top: 20px;
            font-size: 13px;
        }

        .links a {
            color: #aaaaaa;
            text-decoration: none;
            display: block;
            margin-top: 8px;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #ffffff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="brand">EduCore</div>
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Usuário" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit">Acessar</button>
        </form>

        <div class="links">
            <a href="#">Esqueceu sua senha?</a>
            <a href="#">Não tem uma conta? Cadastre-se</a>
        </div>
    </div>

</body>
</html>
