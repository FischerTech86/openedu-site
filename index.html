<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabaritei</title>
    <style>
        /* Estilo Geral */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f7fa; /* Cor de fundo leve */
            overflow: hidden; /* Remove barras de rolagem */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container da animação */
        .animation-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .symbol {
            position: absolute;
            color: rgba(74, 71, 163, 0.15); /* Cor azul suave com transparência */
            font-weight: bold;
            font-size: 20px;
            animation: float 15s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Card Central */
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            z-index: 2;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h1 {
            color: #3b3986;
            margin-bottom: 30px;
            font-size: 24px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #d1d1d1;
            border-radius: 5px;
            box-sizing: border-box;
            outline: none;
            color: #555;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4a47a3;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #353380;
        }

        .links {
            margin-top: 15px;
            font-size: 14px;
        }

        .links a {
            color: #4a47a3;
            text-decoration: underline;
            cursor: pointer;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Fundo animado -->
    <div class="animation-container" id="animation"></div>

    <!-- Interface Principal -->
    <div class="card">
        <h1>GABARITEI</h1>
        <input type="text" placeholder="Digite seu usuário">
        <input type="password" placeholder="Digite sua senha">
        <button>Acessar o Gabaritei</button>
        <div class="links">
            <a href="#">Esqueceu a senha?</a>
            <a href="#">Você não tem outra conta? Crie uma aqui</a>
        </div>
    </div>

    <script>
        // Criar símbolos flutuantes
        const container = document.getElementById('animation');
        const symbols = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0', 'A', 'B', 'C', 'X', 'Y', 'Z', 'π', 'Δ', 'Σ', '∞', '+', '='];

        for (let i = 0; i < 50; i++) {
            const span = document.createElement('span');
            span.classList.add('symbol');
            span.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            
            // Posição aleatória
            span.style.left = Math.random() * 100 + 'vw';
            span.style.top = Math.random() * 100 + 'vh';
            
            // Duração e delay aleatório para parecer natural
            span.style.animationDuration = (Math.random() * 10 + 10) + 's';
            span.style.animationDelay = (Math.random() * 10) + 's';
            
            container.appendChild(span);
        }
    </script>
</body>
</html>
