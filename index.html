<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabaritei - Login</title>
    <style>
        /* Reset de estilos para garantir que funcione igual em qualquer navegador */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Canvas que cobre o fundo inteiro para a animação */
        #animation-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Card de Login Centralizado */
        .login-box {
            background: rgba(255, 255, 255, 0.96);
            padding: 45px 35px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 420px;
            z-index: 2;
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* Título Principal Bem Grande */
        .main-title {
            font-size: 2.8rem;
            font-weight: 800;
            color: #111111;
            margin-bottom: 45px;
            letter-spacing: 3px;
        }

        /* Estrutura dos Campos de Entrada (Estilo Linha do Print) */
        .input-field {
            text-align: left;
            margin-bottom: 28px;
        }

        .input-field label {
            display: block;
            font-size: 0.95rem;
            color: #8a8a8a;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-field input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #e2e8f0;
            padding: 10px 0;
            font-size: 1.1rem;
            color: #2d3748;
            background: transparent;
            outline: none;
            transition: border-color 0.3s ease;
        }

        /* Placeholder bem sutil */
        .input-field input::placeholder {
            color: #cbd5e1;
        }

        /* Efeito ao clicar no campo */
        .input-field input:focus {
            border-bottom-color: #1a202c;
        }

        /* Botão customizado igual à imagem */
        .btn-access {
            width: 100%;
            background-color: #2d3748;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 25px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn-access:hover {
            background-color: #1a202c;
        }

        .btn-access:active {
            transform: scale(0.99);
        }

        /* Links de Suporte e Cadastro Inferiores */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .custom-link {
            color: #4a5568;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .custom-link:hover {
            color: #000000;
            text-decoration: underline;
        }

        .signup-link {
            font-weight: 700;
            color: #2d3748;
        }
    </style>
</head>
<body>

    <!-- Canvas para rodar a animação de fundo -->
    <canvas id="animation-canvas"></canvas>

    <!-- Caixa de Login -->
    <div class="login-box">
        <h1 class="main-title">GABARITEI</h1>
        
        <form onsubmit="event.preventDefault();">
            <!-- Input de Usuário -->
            <div class="input-field">
                <label for="user">Usuário</label>
                <input type="text" id="user" placeholder="Digite seu usuário" required>
            </div>

            <!-- Input de Senha -->
            <div class="input-field">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>

            <!-- Botão de Ação -->
            <button type="submit" class="btn-access">Acessar o Gabaritei</button>
        </form>

        <!-- Links solicitados -->
        <div class="links-group">
            <a href="#" class="custom-link">Esqueceu a senha?</a>
            <a href="#" class="custom-link signup-link">Você não tem outra conta? Crie uma aqui</a>
        </div>
    </div>

    <script>
        // --- SCRIPT DA ANIMAÇÃO DE QUEDA EM ALTA PERFORMANCE ---
        const canvas = document.getElementById('animation-canvas');
        const ctx = canvas.getContext('2d');

        // Redimensiona o fundo dinamicamente
        function setupCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setupCanvas);
        setupCanvas();

        // Elementos que vão cair no fundo (Livros, Letras, Números e Operadores)
        const elementsPool = [
            '📚', '📖', '✏️', '📝', '🎓', '📓', '📐',
            'A', 'B', 'C', 'X', 'Y', 'Z', 'M', 'N', 'H',
            '1', '2', '3', '5', '7', '8', '9', '0', 'π', '√', '%', '+'
        ];

        const particleCount = 65; // Densidade ideal para ficar bonito e leve
        const particlesArray = [];

        class ElementParticle {
            constructor() {
                this.init();
                // Distribui os elementos verticalmente no primeiro carregamento
                this.y = Math.random() * canvas.height;
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = -60; 
                this.speed = Math.random() * 1.3 + 0.7; // Queda suave e ritmada
                this.size = Math.random() * 12 + 15; // Tamanhos variados entre 15px e 27px
                this.content = elementsPool[Math.floor(Math.random() * elementsPool.length)];
                this.opacity = Math.random() * 0.35 + 0.15; // Fundo suave para não atrapalhar o formulário
                this.angle = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 0.4; // Rotação individual sutil
            }

            update() {
                this.y += this.speed;
                this.angle += this.rotationSpeed;

                // Quando sai da tela por baixo, reinicia no topo com novas propriedades
                if (this.y > canvas.height + 50) {
                    this.init();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.angle * Math.PI) / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#4a5568';
                ctx.font = `bold ${this.size}px 'Segoe UI', sans-serif`;
                ctx.fillText(this.content, 0, 0);
                ctx.restore();
            }
        }

        // Criando a coleção de partículas
        for (let i = 0; i < particleCount; i++) {
            particlesArray.push(new ElementParticle());
        }

        // Loop de renderização contínua (60fps nativo)
        function runAnimation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            
            requestAnimationFrame(runAnimation);
        }

        runAnimation();
    </script>
</body>
</html>
