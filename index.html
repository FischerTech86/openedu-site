<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Estilo Cinza Forte</title>
    <style>
        /* Fundo da página levemente acinzentado para destacar o quadrado */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #E5E5E5; 
            font-family: 'Segoe UI', sans-serif;
        }

        /* O Quadrado de Login em cinza forte */
        .login-box {
            background-color: #4A4A4A; /* Cinza forte */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 320px;
            text-align: center;
        }

        h2 { 
            margin-bottom: 25px; 
            color: #FFFFFF; /* Texto branco para dar contraste no fundo cinza */
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none; /* Sem borda para um visual mais limpo */
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #F8F8F8; /* Inputs claros para destacar no fundo escuro */
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #333333; /* Cor do botão quase preta */
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1A1A1A; /* Escurece ainda mais ao passar o mouse */
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Usuário" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

</body>
</html>
