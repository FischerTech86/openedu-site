<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cinza Super Forte</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0; /* Fundo claro para destacar o cinza escuro */
            font-family: 'Segoe UI', sans-serif;
        }

        .login-box {
            background-color: #2D2D2D; /* Cinza super forte/grafite */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 320px;
            text-align: center;
        }

        h2 { 
            margin-bottom: 25px; 
            color: #FFFFFF; /* Título em branco */
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #4A4A4A; /* Input com um cinza um pouco mais claro */
            color: white; /* Texto digitado em branco */
        }

        /* Cor do placeholder (o texto dentro da caixa) */
        input::placeholder {
            color: #CCCCCC;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff; /* Azul para contraste */
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Usuário" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

</body>
</html>
