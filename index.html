<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabaritei - Login</title>
    <style>
        /* Configurações Gerais de Estilo */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Canvas da Animação de Fundo */
        #canvas-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Container do Formulário (Baseado na sua Imagem) */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            z-index: 2;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* Título Grande */
        .brand-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Grupos de Input (Estilo Linha igual ao print) */
        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: #8c8c8c;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #e0e0e0;
            padding: 10px 0;
            font-size: 1.1rem;
            color: #333;
            background: transparent;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input::placeholder {
            color: #ccc;
        }

        .input-group input:focus {
            border-bottom-color: #2d3748;
        }

        /* Botão Acessar */
        .btn-submit {
            width: 100%;
            background-color: #2d3748;
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 25px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            background-color: #1a202c;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Links de Ajuda e Cadastro */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .login-link {
            color: #4a4a4a;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .login-link:hover {
            color: #000;
            text-decoration: underline;
        }

        .create-account {
            font-weight: 600;
            color: #4a5568;
        }
    </style>
</head>
<body>

    <!-- Canvas para a chuva de livros, letras e números -->
    <canvas id="canvas-background"></canvas>

    <!-- Tela de Login -->
    <div class="login-card">
        <h1 class="brand-title">GABARITEI</h1>
        
        <form onsubmit="event.preventDefault();">
            <!-- Campo Usuário -->
            <div class="input-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" placeholder="Digite seu usuário" required>
            </div>

            <!-- Campo Senha -->
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>

            <!-- Botão de Acesso -->
            <button type="submit" class="btn-submit">Acessar o Gabaritei</button>
        </form>

        <!-- Links de navegação inferiores -->
        <div class="links-container">
            <a href="#" class="login-link">Esqueceu a senha?</a>
            <a href="#" class="login-link create-account">Você não tem outra conta? Crie uma aqui</a>
        </div>
    </div>

    <script>
        // --- ANIMAÇÃO DE FUNDO (Chuva de Conhecimento) ---
        const canvas = document.getElementById('canvas-background');
        const ctx = canvas.getContext('2d');

        // Ajusta o tamanho do canvas para cobrir a tela inteira
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Caracteres que vão cair (Letras, Números e Emojis de Livros/Estudo)
        const items = [
            '📚', '📖', '✏️', '📐', '🎓', '📝', '📓',
            'A', 'B', 'C', 'X', 'Y', 'Z', 'N', 'M',
            '1', '2', '3', '7', '8', '9', '0', 'π', '√', '%'
        ];

        // Configuração das partículas
        const totalParticles = 60; // Quantidade de elementos na tela para não embolar
        const particles = [];

        class Particle {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height; // Começa em posições aleatórias na primeira carga
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -50; // Começa um pouco acima da tela
                this.speed = Math.random() * 1.5 + 0.8; // Velocidade de queda suave
                this.fontSize = Math.random() * 14 + 14; // Tamanho entre 14px e 28px
                this.char = items[Math.floor(Math.random() * items.length)];
                this.opacity = Math.random() * 0.4 + 0.15; // Opacidade leve para ficar ao fundo
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 0.5; // Rotação bem sutil ao cair
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;

                // Se passar do fim da tela, reinicia no topo
                if (this.y > canvas.height + 40) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#4a5568'; // Cor neutra e elegante para as letras/números
                ctx.font = `${this.fontSize}px 'Segoe UI', sans-serif`;
                ctx.fillText(this.char, 0, 0);
                ctx.restore();
            }
        }

        // Inicializa a lista de partículas
        for (let i = 0; i < totalParticles; i++) {
            particles.push(new Particle());
        }

        // Loop de Animação executado em alta performance
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
