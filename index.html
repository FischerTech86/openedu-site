<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabaritei - Sistema</title>
    <style>
        /* Reset e Fundo */
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container da animação */
        .animation-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Estilo dos símbolos (MAIORES E MAIS VISÍVEIS) */
        .symbol {
            position: absolute;
            font-size: 80px; /* Tamanho grande */
            font-weight: 900;
            opacity: 0.6; /* Visibilidade alta */
            user-select: none;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-20vh) rotate(360deg); }
        }

        /* Card Central */
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 1;
            width: 100%;
            max-width: 350px;
            text-align: center;
            border: 1px solid #ddd;
        }

        h1 { color: #3b3986; margin-bottom: 30px; font-size: 28px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e1e1e1; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: #4a47a3; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #353380; }
        .links { margin-top: 20px; font-size: 14px; }
        .links a { color: #4a47a3; text-decoration: underline; cursor: pointer; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="animation-container" id="animation"></div>

    <div class="card">
        <h1>GABARITEI</h1>
        <input type="text" placeholder="Digite seu usuário">
        <input type="password" placeholder="Digite sua senha">
        <button>Acessar o Gabaritei</button>
        <div class="links">
            <a href="#">Esqueceu a senha?</a>
            <a href="#">Você não tem conta? Crie uma aqui</a>
        </div>
    </div>

    <script>
        const container = document.getElementById('animation');
        const symbols = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0', 'A', 'B', 'C', 'X', 'Y', 'Z', 'π', 'Δ', 'Σ', '∞', '+', '='];
        const colors = ['#4a47a3', '#e83e8c', '#fd7e14', '#28a745', '#17a2b8', '#6f42c1'];

        for (let i = 0; i < 25; i++) {
            const span = document.createElement('span');
            span.classList.add('symbol');
            span.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            
            // Cores vibrantes
            span.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            // Tamanho grande randômico
            span.style.fontSize = (Math.random() * 60 + 50) + 'px'; 
            
            // Posição e velocidade
            span.style.left = Math.random() * 90 + 'vw';
            span.style.top = Math.random() * 90 + 'vh';
            span.style.animationDuration = (Math.random() * 15 + 10) + 's';
            
            container.appendChild(span);
        }
    </script>
</body>
</html>
