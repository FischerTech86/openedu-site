<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9; /* Fundo bem branco/claro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-box {
            background-color: #333333; /* Cinza forte conforme solicitado */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 320px;
            text-align: center;
            color: white;
        }

        h2 { 
            margin-bottom: 25px; 
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            margin-top: 5px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Estilo profissional para os links */
        .links {
            margin-top: 20px;
            font-size: 13px;
        }

        .links a {
            color: #cccccc; /* Cinza claro para contraste */
            text-decoration: none;
            display: block;
            margin-top: 8px;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #ffffff; /* Fica branco ao passar o mouse */
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Usuário" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>

        <div class="links">
            <a href="#">Esqueceu sua senha?</a>
            <a href="#">Não tem uma conta? Cadastre-se</a>
        </div>
    </div>

</body>
</html>
