<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore - Login</title>
    <style>
        /* Estrutura da página */
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Animação do título */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Nome do site em destaque */
        .brand-title {
            font-size: 50px;
            font-weight: 800;
            color: #202020;
            margin-bottom: 25px;
            animation: fadeIn 1.2s ease-out;
        }

        /* Quadrado de login cinza forte */
        .login-box {
            background-color: #202020;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 320px;
            text-align: center;
            color: #ffffff;
        }

        h2 { 
            margin-bottom: 25px; 
            font-weight: 500;
        }

        /* Inputs e Botão */
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #333333;
            color: white;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Links profissionais */
        .links {
            margin-top: 25px;
            font-size: 13px;
        }

        .links a {
            color: #aaaaaa;
            text-decoration: none;
            display: block;
            margin-top: 10px;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #ffffff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="brand-title">EduCore</div>

    <div class="login-box">
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Usuário" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit">Acessar</button>
        </form>

        <div class="links">
            <a href="#">Esqueceu sua senha?</a>
            <a href="#">Não tem uma conta? Cadastre-se</a>
        </div>
    </div>

</body>
</html>
