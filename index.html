<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabaritei - Sistema de Estudos</title>
    <style>
        /* Reset de estilos para garantir uniformidade entre navegadores */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Canvas para a animação de fundo */
        #animation-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Card de Login Centralizado */
        .login-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 45px 35px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(79, 70, 229, 0.15);
            width: 100%;
            max-width: 420px;
            z-index: 2;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Título Principal com Alto Destaque */
        .main-title {
            font-size: 3rem;
            font-weight: 900;
            color: #4f46e5;
            margin-bottom: 45px;
            letter-spacing: 4px;
            text-shadow: 0 2px 10px rgba(79, 70, 229, 0.1);
        }

        /* Subtítulos para as outras telas */
        .sub-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1f2937;
            margin-bottom: 30px;
        }

        /* Oculta as telas que não devem aparecer inicialmente */
        .screen {
            display: none;
        }

        /* Exibe a tela ativa */
        .screen.active {
            display: block;
        }

        /* Campos de Entrada (Estilo Linha conforme o modelo) */
        .input-field {
            text-align: left;
            margin-bottom: 28px;
        }

        .input-field label {
            display: block;
            font-size: 0.95rem;
            color: #4b5563;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .input-field input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #d1d5db;
            padding: 10px 0;
            font-size: 1.1rem;
            color: #1f2937;
            background: transparent;
            outline: none;
            transition: border-color 0.3s ease;
        }

        /* Placeholder */
        .input-field input::placeholder {
            color: #9ca3af;
        }

        /* Linha acende com a cor do tema ao focar */
        .input-field input:focus {
            border-bottom-color: #4f46e5;
        }

        /* Botão com alto destaque e contraste */
        .btn-access {
            width: 100%;
            background-color: #4f46e5;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
            transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
        }

        .btn-access:hover {
            background-color: #4338ca;
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
        }

        .btn-access:active {
            transform: scale(0.99);
        }

        /* Links de Suporte e Cadastro */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .custom-link {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.95rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .custom-link:hover {
            color: #111111;
            text-decoration: underline;
        }

        .signup-link {
            font-weight: 700;
            color: #4f46e5;
        }
        
        .signup-link:hover {
            color: #4338ca;
        }
    </style>
</head>
<body>

    <!-- Canvas para rodar a animação de fundo -->
    <canvas id="animation-canvas"></canvas>

    <!-- Caixa Principal do Sistema -->
    <div class="login-box">
        <h1 class="main-title">GABARITEI</h1>
        
        <!-- ================= TELA DE LOGIN ================= -->
        <div id="screen-login" class="screen active">
            <form onsubmit="handleLogin(event)">
                <div class="input-field">
                    <label for="login-user">Usuário</label>
                    <input type="text" id="login-user" placeholder="Digite seu usuário" required>
                </div>

                <div class="input-field">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn-access">Acessar o Gabaritei</button>
            </form>

            <div class="links-group">
                <a onclick="navigateTo('screen-forgot')" class="custom-link">Esqueceu a senha?</a>
                <a onclick="navigateTo('screen-signup')" class="custom-link signup-link">Você não tem outra conta? Crie uma aqui</a>
            </div>
        </div>

        <!-- ================= TELA DE CRIAR CONTA ================= -->
        <div id="screen-signup" class="screen">
            <h2 class="sub-title">Criar Conta</h2>
            <form onsubmit="handleSignup(event)">
                <div class="input-field">
                    <label for="signup-user">Nome de Usuário</label>
                    <input type="text" id="signup-user" placeholder="Escolha um usuário" required>
                </div>

                <div class="input-field">
                    <label for="signup-email">E-mail</label>
                    <input type="email" id="signup-email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="input-field">
                    <label for="signup-password">Senha</label>
                    <input type="password" id="signup-password" placeholder="Crie uma senha" required>
                </div>

                <button type="submit" class="btn-access">Cadastrar Conta</button>
            </form>

            <div class="links-group">
                <a onclick="navigateTo('screen-login')" class="custom-link signup-link">Já tem uma conta? Acesse aqui</a>
            </div>
        </div>

        <!-- ================= TELA DE RECUPERAR SENHA ================= -->
        <div id="screen-forgot" class="screen">
            <h2 class="sub-title">Recuperar Senha</h2>
            <form onsubmit="handleForgotPassword(event)">
                <div class="input-field">
                    <label for="forgot-user">Nome de Usuário</label>
                    <input type="text" id="forgot-user" placeholder="Digite seu nome de usuário" required>
                </div>

                <div class="input-field">
                    <label for="forgot-email">E-mail</label>
                    <input type="email" id="forgot-email" placeholder="Digite o e-mail cadastrado" required>
                </div>

                <button type="submit" class="btn-access">Recuperar Minha Senha</button>
            </form>

            <div class="links-group">
                <a onclick="navigateTo('screen-login')" class="custom-link signup-link">Lembrou a senha? Voltar para o login</a>
            </div>
        </div>

    </div>

    <script>
        // --- FUNÇÕES DE NAVEGAÇÃO ENTRE TELAS ---
        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        // --- SISTEMA REAL DE AUTENTICAÇÃO COM LOCALSTORAGE ---
        
        // 1. Função de Login
        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-password').value;

            // Busca o usuário na memória do navegador
            const savedData = localStorage.getItem(`gabaritei_user_${user.toLowerCase()}`);

            if (savedData) {
                const userData = JSON.parse(savedData);
                if (userData.password === pass) {
                    alert(`🎉 Sucesso! Bem-vindo ao Gabaritei, ${userData.username}!`);
                    // Limpa os campos após o login correto
                    document.getElementById('login-user').value = '';
                    document.getElementById('login-password').value = '';
                } else {
                    alert('❌ Erro: Senha incorreta! Tente novamente.');
                }
            } else {
                alert('❌ Erro: Esse usuário não existe! Clique em "Crie uma aqui" para se cadastrar.');
            }
        }

        // 2. Função de Cadastro (Salva na memória)
        function handleSignup(event) {
            event.preventDefault();
            const user = document.getElementById('signup-user').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const pass = document.getElementById('signup-password').value;

            if (user === '' || email === '' || pass === '') return;

            // Cria o objeto do usuário
            const accountData = {
                username: user,
                email: email,
                password: pass
            };

            // Salva usando o nome do usuário como chave única
            localStorage.setItem(`gabaritei_user_${user.toLowerCase()}`, JSON.stringify(accountData));

            alert(`✅ Conta criada com sucesso para: ${user}!\nAgora você já pode fazer o seu login.`);
            
            // Limpa o formulário de cadastro
            document.getElementById('signup-user').value = '';
            document.getElementById('signup-email').value = '';
            document.getElementById('signup-password').value = '';

            // Manda de volta para a tela de login
            navigateTo('screen-login');
        }

        // 3. Função de Esqueci a Senha (Valida usuário + e-mail e mostra a senha)
        function handleForgotPassword(event) {
            event.preventDefault();
            const user = document.getElementById('forgot-user').value.trim();
            const email = document.getElementById('forgot-email').value.trim();

            const savedData = localStorage.getItem(`gabaritei_user_${user.toLowerCase()}`);

            if (savedData) {
                const userData = JSON.parse(savedData);
                // Valida se o e-mail digitado confere com o e-mail guardado no cadastro
                if (userData.email.toLowerCase() === email.toLowerCase()) {
                    alert(`📧 Enviado! Sua senha recuperada é: ${userData.password}\n\n(Aviso: Um e-mail de confirmação foi disparado para ${userData.email})`);
                    
                    document.getElementById('forgot-user').value = '';
                    document.getElementById('forgot-email').value = '';
                    navigateTo('screen-login');
                } else {
                    alert('❌ Erro: O e-mail digitado não bate com o e-mail registrado para esse usuário.');
                }
            } else {
                alert('❌ Erro: Nome de usuário não encontrado no sistema.');
            }
        }


        // --- ANIMAÇÃO DOS ELEMENTOS DE FUNDO (COM ALTO DESTAQUE) ---
        const canvas = document.getElementById('animation-canvas');
        const ctx = canvas.getContext('2d');

        function setupCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setupCanvas);
        setupCanvas();

        const elementsPool = [
            '📚', '📖', '✏️', '📝', '🎓', '📓', '📐',
            'A', 'B', 'C', 'X', 'Y', 'Z', 'M', 'N', 'H',
            '1', '2', '3', '5', '7', '8', '9', '0', 'π', '√', '%', '+'
        ];

        const colorsPool = ['#4f46e5', '#3b82f6', '#10b981', '#f59e0b', '#6b7280'];
        const particleCount = 65; 
        const particlesArray = [];

        class ElementParticle {
            constructor() {
                this.init();
                this.y = Math.random() * canvas.height;
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = -60; 
                this.speed = Math.random() * 1.3 + 0.7; 
                this.size = Math.random() * 12 + 15; 
                this.content = elementsPool[Math.floor(Math.random() * elementsPool.length)];
                this.color = colorsPool[Math.floor(Math.random() * colorsPool.length)];
                this.opacity = Math.random() * 0.3 + 0.55; 
                this.angle = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 0.4; 
            }

            update() {
                this.y += this.speed;
                this.angle += this.rotationSpeed;

                if (this.y > canvas.height + 50) {
                    this.init();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.angle * Math.PI) / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.font = `bold ${this.size}px 'Segoe UI', sans-serif`;
                ctx.fillText(this.content, 0, 0);
                ctx.restore();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particlesArray.push(new ElementParticle());
        }

        function runAnimation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            
            requestAnimationFrame(runAnimation);
        }

        runAnimation();
    </script>
</body>
</html>
