<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore - Login</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column; /* Organiza os elementos um abaixo do outro */
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Animação de surgimento */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Título Principal acima do quadrado */
        .title-brand {
            font-size: 48px;
            font-weight: bold;
            color: #202020;
            margin-bottom: 20px;
            animation: fadeIn 1.5s ease; /* Aplica a animação */
        }

        .login-box {
            background-color: #202020;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 320px;
            text-align: center;
            color: white;
        }

        h2 { margin-bottom: 25px; font-weight: 600; color: #ffffff; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 6px;
            background-color: #333333;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover { background-color: #0056b3; }

        .links { margin-top: 20px; font-size: 13px; }
        .links a { color: #aaaaaa; text-decoration: none; display: block; margin-top: 8px; }
        .links a:hover { color: #ffffff; }
    </style>
</head>
<body>

    <!-- Nome com animação -->
    <div class="title-brand">EduCore</div>

    <!-- Quadrado de Login -->
    <div class="login-box">
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Usuário" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit">Acessar</button>
        </form>
        <div class="links">
            <a href="#">Esqueceu sua senha?</a>
            <a href="#">Não tem uma conta? Cadastre-se</a>
        </div>
    </div>

</body>
</html>
