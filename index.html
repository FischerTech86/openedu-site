<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabaritei - Acesso</title>
    <style>
        /* CSS para o visual */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f5f7; /* Cor de fundo clara */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        h1 { color: #4e44e0; margin-bottom: 25px; }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label { display: block; font-size: 14px; color: #555; margin-bottom: 5px; }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4e44e0;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .links { margin-top: 20px; font-size: 13px; color: #777; }
        .links a { color: #4e44e0; text-decoration: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>GABARITEI</h1>
        
        <div class="input-group">
            <label>Usuário</label>
            <input type="text" placeholder="Digite seu usuário">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" placeholder="Digite sua senha">
        </div>

        <button>Acessar o Gabaritei</button>

        <div class="links">
            <p>Esqueceu a senha?</p>
            <p>Você não tem outra conta? <a href="#">Crie uma aqui</a></p>
        </div>
    </div>

</body>
</html>
