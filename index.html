<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ensino Fundamental II</title>
    
    <!-- Importação da nova fonte para o Ensino Fundamental II -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    
    <style>
        /* Reset básico para visualização */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d0e12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container do bloco idêntico ao print */
        .box-fund2 {
            background-color: #16171d;
            padding: 40px;
            border-radius: 4px;
            max-width: 950px;
            width: 100%;
        }

        /* Título com a NOVA fonte aplicada */
        .title-fund2 {
            font-family: 'Bangers', cursive;
            font-size: 38px;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 35px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* Grid dos 4 Cards */
        .years-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* Cards escuros com bordas finas */
        .year-card {
            background-color: #111216;
            border: 1px solid #2d303e;
            padding: 35px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .year-card:hover {
            transform: scale(1.02);
            background-color: #1a1b23;
        }

        /* Texto dos Cards com a NOVA fonte aplicada */
        .text-fund2 {
            font-family: 'Bangers', cursive;
            font-size: 26px;
            letter-spacing: 1px;
        }

        /* Ícones configurados */
        svg {
            width: 55px;
            height: 55px;
            stroke-width: 1.8;
            fill: none;
        }

        /* Cores exatas de cada Ano do seu print */
        .color-6 { color: #ff0055; stroke: #ff0055; }
        .color-7 { color: #00f5d4; stroke: #00f5d4; }
        .color-8 { color: #ccff00; stroke: #ccff00; }
        .color-9 { color: #ff9f43; stroke: #ff9f43; }

        /* Responsividade para telas menores */
        @media (max-width: 800px) {
            .years-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .years-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Bloco Isolado do Ensino Fundamental II -->
    <div class="box-fund2">
        <div class="title-fund2">
            <span>🔬</span> ENSINO FUNDAMENTAL II
        </div>
        
        <div class="years-grid">
            
            <!-- 6º Ano (Rosa/Grid) -->
            <div class="year-card">
                <svg class="color-6" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
                <div class="text-fund2 color-6">6º ANO</div>
            </div>

            <!-- 7º Ano (Cian/Caderno) -->
            <div class="year-card">
                <svg class="color-7" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    <line x1="9" y1="6" x2="15" y2="6"></line>
                    <line x1="9" y1="10" x2="15" y2="10"></line>
                </svg>
                <div class="text-fund2 color-7">7º ANO</div>
            </div>

            <!-- 8º Ano (Limão/Tubo de Ensaio) -->
            <div class="year-card">
                <svg class="color-8" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 2h4M19 22H5M10 2v15.5a2.5 2.5 0 0 0 5 0V2M6 14h12"></path>
                </svg>
                <div class="text-fund2 color-8">8º ANO</div>
            </div>

            <!-- 9º Ano (Laranja/Átomo) -->
            <div class="year-card">
                <svg class="color-9" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <ellipse cx="12" cy="12" rx="3" ry="9" transform="rotate(45 12 12)"></ellipse>
                    <ellipse cx="12" cy="12" rx="3" ry="9" transform="rotate(-45 12 12)"></ellipse>
                    <circle cx="12" cy="12" r="2"></circle>
                </svg>
                <div class="text-fund2 color-9">9º ANO</div>
            </div>

        </div>
    </div>

</body>
</html>
