<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Elegante</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e5e5e5;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-box {
            background-color: #2D2D2D; /* Cinza super forte */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 320px;
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            margin-bottom: 15px;
        }

        h2 { 
            margin-bottom: 25px; 
            color: #FFFFFF; 
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #4A4A4A;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
            transform: scale(1.02);
        }

        .links {
            margin-top: 20px;
            font-size: 13px;
        }

        .links a {
            color: #AAAAAA;
            text-decoration: none;
            display: block;
            margin-top: 8px;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #FFFFFF;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">MeuProjeto</div>
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Usuário" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>

        <div class="links">
            <a href="#">Esqueceu sua senha?</a>
            <a href="#">Não tem uma conta? Cadastre-se</a>
        </div>
    </div>

</body>
</html>
