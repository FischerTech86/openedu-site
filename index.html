<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabaritei - Acesso</title>
    <style>
        /* Reset básico e configurações gerais */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Importante para não ter barra de rolagem com a animação */
            position: relative;
        }

        /* Container do Fundo Animado */
        #particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Fica atrás do formulário */
            pointer-events: none; /* Permite clicar no formulário através das partículas */
        }

        /* Estilo base das partículas */
        .particle {
            position: absolute;
            font-weight: bold;
            opacity: 0.7;
            user-select: none;
            /* A animação será aplicada via JavaScript dinamicamente */
        }

        /* Estilos do Formulário (O Card Principal) */
        .card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 380px;
            text-align: center;
            z-index: 10; /* Fica acima das partículas */
            position: relative;
        }

        .card h1 {
            color: #4e44e0;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* Estilo dos inputs simulando a linha inferior que parece ter na sua imagem */
        .input-group input {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-bottom: 1px solid #ccc;
            font-size: 14px;
            color: #333;
            background: transparent;
            transition: border-color 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-bottom-color: #4e44e0;
        }

        .input-group input::placeholder {
            color: #aaa;
            font-size: 13px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #5b4ce8;
            color: white;
            border: none;
            border-radius: 25px; /* Botão mais arredondado */
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s ease, transform 0.1s ease;
            box-shadow: 0 4px 10px rgba(91, 76, 232, 0.3);
        }

        .btn-submit:hover {
            background-color: #4739c9;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .links {
            margin-top: 25px;
            font-size: 13px;
            color: #888;
            line-height: 1.8;
        }

        .links p { margin: 5px 0; }
        
        .links a {
            color: #5b4ce8;
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover { text-decoration: underline; }

        /* Animações CSS Genéricas que o JS usará */
        @keyframes float-up {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        @keyframes float-down {
            0% { transform: translateY(-20vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(100vh) rotate(-360deg); opacity: 0; }
        }
        
        @keyframes float-left {
             0% { transform: translateX(100vw) rotate(0deg); opacity: 0; }
             10% { opacity: 0.8; }
             90% { opacity: 0.8; }
             100% { transform: translateX(-20vw) rotate(360deg); opacity: 0; }
        }

        @keyframes float-right {
             0% { transform: translateX(-20vw) rotate(0deg); opacity: 0; }
             10% { opacity: 0.8; }
             90% { opacity: 0.8; }
             100% { transform: translateX(100vw) rotate(-360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Container das partículas animadas -->
    <div id="particles-container"></div>

    <!-- O Card Principal -->
    <div class="card">
        <h1>GABARITEI</h1>
        
        <div class="input-group">
            <label>Usuário</label>
            <input type="text" placeholder="Digite seu usuário">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" placeholder="Digite sua senha">
        </div>

        <button class="btn-submit">Acessar o Gabaritei</button>

        <div class="links">
            <p>Esqueceu a senha?</p>
            <p>Você não tem outra conta? <a href="#">Crie uma aqui</a></p>
        </div>
    </div>

    <script>
        // --- LÓGICA DAS PARTÍCULAS ---

        const container = document.getElementById('particles-container');
        
        // Arrays de caracteres e cores inspirados na sua imagem
        const chars = ['A', 'B', 'C', 'X', 'Y', 'Z', '1', '2', '3', '7', '8', '9', 'π', '∞', '%', '+', '-', '=', '📝', '🎓', '✏️'];
        const colors = ['#a2b9bc', '#b2ad7f', '#878f99', '#6b5b95', '#ff7b25', '#d64161', '#4b86b4', '#55d09b'];
        const animations = ['float-up', 'float-down', 'float-left', 'float-right'];

        const numParticles = 40; // Quantidade de elementos na tela

        function createParticle() {
            const el = document.createElement('div');
            el.classList.add('particle');
            
            // Escolhe caractere, cor e animação aleatórios
            const char = chars[Math.floor(Math.random() * chars.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            const animation = animations[Math.floor(Math.random() * animations.length)];
            
            el.innerText = char;
            el.style.color = color;
            
            // Tamanho aleatório
            const size = Math.random() * 15 + 10; // entre 10px e 25px
            el.style.fontSize = `${size}px`;

            // Posição inicial baseada no tipo de animação
            if (animation === 'float-up' || animation === 'float-down') {
                el.style.left = `${Math.random() * 100}vw`;
            } else {
                el.style.top = `${Math.random() * 100}vh`;
            }

            // Duração e delay aleatórios
            const duration = Math.random() * 20 + 15; // Entre 15s e 35s
            const delay = Math.random() * 15; // Delay inicial aleatório
            
            el.style.animation = `${animation} ${duration}s linear ${delay}s infinite`;

            container.appendChild(el);
        }

        // Cria as partículas iniciais
        for (let i = 0; i < numParticles; i++) {
            createParticle();
        }
    </script>
</body>
</html>
