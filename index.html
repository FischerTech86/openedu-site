<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Moderno</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }

        /* Estilo do Logo */
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s; /* Efeito de transição */
        }

        button:hover {
            background-color: #0056b3;
            transform: scale(1.02); /* Botão cresce levemente ao passar o mouse */
        }

        /* Estilo dos links extras */
        .links {
            margin-top: 15px;
            font-size: 13px;
        }

        .links a {
            color: #007bff;
            text-decoration: none;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">MeuProjeto</div> <!-- Logo/Nome da marca -->
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Usuário" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>

        <!-- Links úteis -->
        <div class="links">
            <a href="#">Esqueceu sua senha?</a>
            <a href="#">Não tem uma conta? Cadastre-se</a>
        </div>
    </div>

</body>
</html>
