<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabaritei - Login</title>
    <style>
        /* Reset de estilos para garantir uniformidade entre navegadores */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Canvas para a animação de fundo */
        #animation-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Card de Login Centralizado */
        .login-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 45px 35px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(79, 70, 229, 0.15);
            width: 100%;
            max-width: 420px;
            z-index: 2;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Título Principal com Alto Destaque */
        .main-title {
            font-size: 3rem;
            font-weight: 900;
            color: #4f46e5;
            margin-bottom: 45px;
            letter-spacing: 4px;
            text-shadow: 0 2px 10px rgba(79, 70, 229, 0.1);
        }

        /* Campos de Entrada (Estilo Linha conforme o modelo) */
        .input-field {
            text-align: left;
            margin-bottom: 28px;
        }

        .input-field label {
            display: block;
            font-size: 0.95rem;
            color: #4b5563;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .input-field input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #d1d5db;
            padding: 10px 0;
            font-size: 1.1rem;
            color: #1f2937;
            background: transparent;
            outline: none;
            transition: border-color 0.3s ease;
        }

        /* Placeholder */
        .input-field input::placeholder {
            color: #9ca3af;
        }

        /* Linha acende com a cor do tema ao focar */
        .input-field input:focus {
            border-bottom-color: #4f46e5;
        }

        /* Botão com alto destaque e contraste */
        .btn-access {
            width: 100%;
            background-color: #4f46e5;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
            transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
        }

        .btn-access:hover {
            background-color: #4338ca;
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
        }

        .btn-access:active {
            transform: scale(0.99);
        }

        /* Links de Suporte e Cadastro */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .custom-link {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .custom-link:hover {
            color: #111111;
            text-decoration: underline;
        }

        .signup-link {
            font-weight: 700;
            color: #4f46e5;
        }
        
        .signup-link:hover {
            color: #4338ca;
        }
    </style>
</head>
<body>

    <!-- Canvas para rodar a animação de fundo -->
    <canvas id="animation-canvas"></canvas>

    <!-- Caixa de Login -->
    <div class="login-box">
        <h1 class="main-title">GABARITEI</h1>
        
        <form onsubmit="event.preventDefault();">
            <!-- Input de Usuário -->
            <div class="input-field">
                <label for="user">Usuário</label>
                <input type="text" id="user" placeholder="Digite seu usuário" required>
            </div>

            <!-- Input de Senha -->
            <div class="input-field">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>

            <!-- Botão de Ação -->
            <button type="submit" class="btn-access">Acessar o Gabaritei</button>
        </form>

        <!-- Links inferiores -->
        <div class="links-group">
            <a href="#" class="custom-link">Esqueceu a senha?</a>
            <a href="#" class="custom-link signup-link">Você não tem outra conta? Crie uma aqui</a>
        </div>
    </div>

    <script>
        // --- ANIMAÇÃO DE QUEDA DOS ELEMENTOS ---
        const canvas = document.getElementById('animation-canvas');
        const ctx = canvas.getContext('2d');

        function setupCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setupCanvas);
        setupCanvas();

        // Livros, Letras, Números e Operadores
        const elementsPool = [
            '📚', '📖', '✏️', '📝', '🎓', '📓', '📐',
            'A', 'B', 'C', 'X', 'Y', 'Z', 'M', 'N', 'H',
            '1', '2', '3', '5', '7', '8', '9', '0', 'π', '√', '%', '+'
        ];

        // Paleta de cores coordenadas para a animação
        const colorsPool = ['#4f46e5', '#3b82f6', '#10b981', '#f59e0b', '#6b7280'];

        const particleCount = 65; 
        const particlesArray = [];

        class ElementParticle {
            constructor() {
                this.init();
                this.y = Math.random() * canvas.height;
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = -60; 
                this.speed = Math.random() * 1.3 + 0.7; 
                this.size = Math.random() * 12 + 15; 
                this.content = elementsPool[Math.floor(Math.random() * elementsPool.length)];
                this.color = colorsPool[Math.floor(Math.random() * colorsPool.length)];
                // ALTERADO: Opacidade aumentada significativamente (de 0.55 a 0.85) para dar muito mais destaque
                this.opacity = Math.random() * 0.3 + 0.55; 
                this.angle = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 0.4; 
            }

            update() {
                this.y += this.speed;
                this.angle += this.rotationSpeed;

                if (this.y > canvas.height + 50) {
                    this.init();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.angle * Math.PI) / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.font = `bold ${this.size}px 'Segoe UI', sans-serif`;
                ctx.fillText(this.content, 0, 0);
                ctx.restore();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particlesArray.push(new ElementParticle());
        }

        function runAnimation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            
            requestAnimationFrame(runAnimation);
        }

        runAnimation();
    </script>
</body>
</html>
