<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Estudos - Seleção de Ano</title>
    <!-- Importação das fontes para diferenciar os estilos visuais -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Permanent+Marker&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CONFIGURAÇÕES GERAIS DO DASHBOARD */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            padding: 40px 20px;
        }
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .dashboard-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 40px;
            color: #fff;
        }
        
        /* ESTRUTURA BASE DOS BLOCOS (BOXES) */
        .box {
            background: #141416;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 35px;
            border: 2px solid transparent;
        }
        .years-grid {
            display: grid;
            gap: 20px;
        }
        .five-cols { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        .four-cols { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
        .three-cols { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }

        .year-card {
            background: #1c1c1e;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.25s ease;
        }
        .year-card svg {
            width: 55px;
            height: 55px;
            transition: transform 0.2s ease;
        }
        .year-card:hover svg {
            transform: scale(1.1);
        }

        /* =======================================================
           1. ESTILO: ENSINO FUNDAMENTAL I (INFANTIL / QUEBRA-CABEÇA)
           ======================================================= */
        .box-fund1 {
            border: 3px dashed #ffd166;
            background: #181714;
        }
        .title-fund1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 28px;
            color: #ffd166;
            text-align: center;
            margin-bottom: 25px;
        }
        .card-fund1 {
            border-radius: 24px; /* Bordas bem arredondadas/suaves */
            border: 3px solid #2d2d30;
        }
        .card-fund1:hover {
            transform: translateY(-5px);
            background: #252420;
        }
        .text-fund1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            font-weight: 700;
        }

        /* =======================================================
           2. ESTILO: ENSINO FUNDAMENTAL II (POP ART / HQ / CIÊNCIA)
           ======================================================= */
        .box-fund2 {
            border: 3px solid #333;
            background: #151515;
            box-shadow: 0px 10px 0px #000;
        }
        .title-fund2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
            color: #00e5ff;
            text-shadow: 3px 3px 0px #000;
        }
        .card-fund2 {
            border-radius: 12px;
            background: #1e1e1e;
            box-shadow: 4px 4px 0px #000; /* Sombra sólida estilo HQ */
        }
        .card-fund2:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px #000;
        }
        .text-fund2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 20px;
            font-weight: 700;
        }

        /* =======================================================
           3. ESTILO: ENSINO MÉDIO (GRAFITE URBANO / VESTIBULAR)
           ======================================================= */
        .box-medio {
            border: 2px solid #222;
            background: #111112;
            position: relative;
            overflow: hidden;
        }
        /* Detalhe de linha de tinta no topo para o Ensino Médio */
        .box-medio::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #ff007f, #7928ca);
        }
        .title-medio {
            font-family: 'Permanent Marker', cursive;
            font-size: 32px;
            text-align: center;
            margin-bottom: 25px;
            color: #ff007f;
            letter-spacing: 2px;
        }
        .card-medio {
            border-radius: 0px; /* Cantos retos e brutos */
            border-left: 5px solid #ff007f;
            background: #161617;
        }
        .card-medio:hover {
            background: #22121b;
            border-left-width: 8px;
        }
        .text-medio {
            font-family: 'Permanent Marker', cursive;
            font-size: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1 class="dashboard-title">🎒 Selecione o Ano Letivo</h1>

        <!-- ==========================================
             BLOCO 1: ENSINO FUNDAMENTAL I (1º ao 5º Ano)
             ========================================== -->
        <div class="box box-fund1">
            <div class="title-fund1">🧩 ENSINO FUNDAMENTAL I</div>
            <div class="years-grid five-cols">
                <!-- 1º Ano -->
                <div class="year-card card-fund1" style="border-color: #ff595e;" onclick="selectYear('ano1', '#ff595e', '🧩 1º ANO - FUNDAMENTAL I')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#ff595e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 16V12"/><path d="M12 8h.01"/></svg>
                    <div class="text-fund1" style="color: #ff595e;">1º ANO</div>
                </div>
                <!-- 2º Ano -->
                <div class="year-card card-fund1" style="border-color: #ffca3a;" onclick="selectYear('ano2', '#ffca3a', '🧩 2º ANO - FUNDAMENTAL I')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#ffca3a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    <div class="text-fund1" style="color: #ffca3a;">2º ANO</div>
                </div>
                <!-- 3º Ano -->
                <div class="year-card card-fund1" style="border-color: #8ac926;" onclick="selectYear('ano3', '#8ac926', '🧩 3º ANO - FUNDAMENTAL I')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#8ac926" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><polyline points="12 12 12 21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                    <div class="text-fund1" style="color: #8ac926;">3º ANO</div>
                </div>
                <!-- 4º Ano -->
                <div class="year-card card-fund1" style="border-color: #1982c4;" onclick="selectYear('ano4', '#1982c4', '🧩 4º ANO - FUNDAMENTAL I')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#1982c4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    <div class="text-fund1" style="color: #1982c4;">4º ANO</div>
                </div>
                <!-- 5º Ano -->
                <div class="year-card card-fund1" style="border-color: #6a4c93;" onclick="selectYear('ano5', '#6a4c93', '🧩 5º ANO - FUNDAMENTAL I')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#6a4c93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 12 15 2 8.5 12 2"/><polyline points="2 17 12 23 22 17"/><polyline points="2 12 12 18 22 12"/></svg>
                    <div class="text-fund1" style="color: #6a4c93;">5º ANO</div>
                </div>
            </div>
        </div>

        <!-- ==========================================
             BLOCO 2: ENSINO FUNDAMENTAL II (6º ao 9º Ano)
             ========================================== -->
        <div class="box box-fund2">
            <div class="title-fund2">💥 ENSINO FUNDAMENTAL II</div>
            <div class="years-grid four-cols">
                <!-- 6º Ano (Planeta/Exploração) -->
                <div class="year-card card-fund2" style="border: 3px solid #ff9f43;" onclick="selectYear('ano6', '#ff9f43', '🚀 6º ANO - ENSINO FUNDAMENTAL II')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#ff9f43" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                    <div class="text-fund2" style="color: #ff9f43;">6º ANO</div>
                </div>

                <!-- 7º Ano (Microscópio/Biologia) -->
                <div class="year-card card-fund2" style="border: 3px solid #2ed573;" onclick="selectYear('ano7', '#2ed573', '🔬 7º ANO - ENSINO FUNDAMENTAL II')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#2ed573" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 18h8M10 22h4M14 2v4M10 2H4v4M10 6H4v12a2 2 0 0 0 2 2h4M14 6h4v6M14 10h4"/>
                        <circle cx="12" cy="6" r="2"/>
                    </svg>
                    <div class="text-fund2" style="color: #2ed573;">7º ANO</div>
                </div>

                <!-- 8º Ano (Tubo de Ensaio/Química) -->
                <div class="year-card card-fund2" style="border: 3px solid #ff4757;" onclick="selectYear('ano8', '#ff4757', '🧪 8º ANO - ENSINO FUNDAMENTAL II')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#ff4757" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 2h4M19 22H5M10 2v15.5a2.5 2.5 0 0 0 5 0V2M6 14h12"/>
                    </svg>
                    <div class="text-fund2" style="color: #ff4757;">8º ANO</div>
                </div>

                <!-- 9º Ano (Átomo/Física) -->
                <div class="year-card card-fund2" style="border: 3px solid #9b59b6;" onclick="selectYear('ano9', '#9b59b6', '⚛️ 9º ANO - ENSINO FUNDAMENTAL II')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#9b59b6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <ellipse cx="12" cy="12" rx="3" ry="9" transform="rotate(45 12 12)"/>
                        <ellipse cx="12" cy="12" rx="3" ry="9" transform="rotate(-45 12 12)"/>
                        <circle cx="12" cy="12" r="2"/>
                    </svg>
                    <div class="text-fund2" style="color: #9b59b6;">9º ANO</div>
                </div>
            </div>
        </div>

        <!-- ==========================================
             BLOCO 3: ENSINO MÉDIO (1º ao 3º Ano)
             ========================================== -->
        <div class="box box-medio">
            <div class="title-medio">👑 ENSINO MÉDIO</div>
            <div class="years-grid three-cols">
                <!-- 1º Ano Ensino Médio (Alvo/Foco) -->
                <div class="year-card card-medio" onclick="selectYear('medio1', '#ff007f', '⚡ 1º ANO - ENSINO MÉDIO')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#ff007f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="6"/>
                        <circle cx="12" cy="12" r="2"/>
                    </svg>
                    <div class="text-medio" style="color: #ff007f;">1º ANO EM</div>
                </div>

                <!-- 2º Ano Ensino Médio (Livros empilhados/Evolução) -->
                <div class="year-card card-medio" style="border-left-color: #a855f7;" onclick="selectYear('medio2', '#a855f7', '⚡ 2º ANO - ENSINO MÉDIO')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 6.5A2.5 2.5 0 0 1 6.5 4H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    <div class="text-medio" style="color: #a855f7;">2º ANO EM</div>
                </div>

                <!-- 3º Ano Ensino Médio (Chapéu de Formatura/Vestibular) -->
                <div class="year-card card-medio" style="border-left-color: #00f5d4;" onclick="selectYear('medio3', '#00f5d4', '🎓 3º ANO - ENSINO MÉDIO')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#00f5d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                        <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/>
                    </svg>
                    <div class="text-medio" style="color: #00f5d4;">3º ANO EM</div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT DE INTEGRAÇÃO DO SISTEMA -->
    <script>
        function selectYear(yearId, color, sectionTitle) {
            console.log("Ano Selecionado:", yearId);
            console.log("Cor do Tema:", color);
            
            // Exemplo de feedback visual ao clicar (pode redirecionar ou abrir o conteúdo do bimester)
            alert("Você abriu as matérias de: " + sectionTitle);
            
            // Caso queira redirecionar no futuro, use algo como:
            // window.location.href = "materias.html?ano=" + yearId;
        }
    </script>
</body>
</html>
